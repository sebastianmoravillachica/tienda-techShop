<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<!-- ================= HEAD ================= -->
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <title>TechShop</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css}">

    <!-- FontAwesome -->
    <link rel="stylesheet"
          th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css}">
</head>



<!-- ================= HEADER ================= -->
<header th:fragment="header">

<nav class="navbar navbar-expand-lg navbar-light bg-light">

    <div class="container-fluid">

        <a class="navbar-brand" th:href="@{/}">
            TechShop
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/categoria/listado}">
                        Categorías
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/producto/listado}">
                        Productos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/consultas}">
                        Consultas
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>


<div class="bg-success text-white p-3">
    <div class="container">

        <h2>
            <i class="fa-solid fa-gear"></i>
            Su tienda en línea
        </h2>

    </div>
</div>

</header>



<!-- ================= FOOTER ================= -->
<footer th:fragment="footer">

<div class="bg-info text-white text-center p-3 mt-4">

    TechShop Derechos Reservados 2025 ©

</div>

<!-- Bootstrap JS -->
<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js}"></script>

</footer>



<!-- ================= TOAST ================= -->
<section th:fragment="mostrarToast">

<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div class="toast align-items-center text-white bg-success border-0">

        <div class="d-flex">

            <div class="toast-body">
                Operación realizada correctamente
            </div>

            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>

        </div>

    </div>

</div>

</section>

</body>
</html>
